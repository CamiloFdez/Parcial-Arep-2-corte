<!DOCTYPE html>
<html>
<head>
    <title>Proxy Collatz</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <h1>Collatz Sequence - GET Request</h1>
    <form action="/collatzsequence">
        <label for="value">Value:</label><br>
        <input type="text" id="value" name="value" value="5"><br><br>
        <input type="button" value="Submit" onclick="loadGetMsg()">
    </form>
    <div id="getrespmsg"></div>

    <script>
        function loadGetMsg() {
            let valueVar = document.getElementById("value").value;
            const xhttp = new XMLHttpRequest();
            xhttp.onload = function () {
                document.getElementById("getrespmsg").innerHTML =
                    this.responseText;
            };
            xhttp.open("GET", "/collatzsequence?value=" + valueVar);
            xhttp.send();
        }
    </script>
</body>

</html>
